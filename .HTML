<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINUCAF 2026</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .hero img {
            width: 100%;
            display: block;
        }

        h1 {
            text-align: center;
            margin: 20px 0;
        }

        /* PLANILHA TELA TOTAL */
        .sheet {
            width: 100%;
            height: calc(100vh - 180px); /* ajusta ao espaço do banner + título */
        }

        .sheet iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <div class="hero">
        <img src="https://github.com/user-attachments/assets/95002fab-b0c3-41f0-a852-3dfba10c26b5">
    </div>

    <h1>SINUCAF 2026</h1>

    <div class="sheet">
        <iframe 
            src="https://docs.google.com/spreadsheets/d/1wqRxj-YdXHLFTMUO8BXtgH1QguwK9YwtSXBHcFbJdSg/preview">
        </iframe>
    </div>

</body>
</html>
