<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINUCAF 2026</title>

<style>
/* RESET */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

/* IMAGEM TOPO */
.hero img {
    width: 100%;
    height: auto;
    display: block;
}

/* CONTAINER FLEXÍVEL */
.container {
    max-width: 1200px;
    margin: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* TÍTULO */
h1 {
    text-align: center;
    font-size: clamp(1.5rem, 3vw, 2.5rem);
}

/* PLANILHA RESPONSIVA */
.sheet {
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

.sheet iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* AJUSTE MOBILE */
@media (max-width: 768px) {
    .container {
        padding: 0.5rem;
    }
}
</style>

</head>

<body>

<!-- IMAGEM TOPO -->
<div class="hero">
    <img src="https://github.com/deux78/site-do-sinucaf/raw/7931415d7193dfd1a3e0f9bdadec623c088bd3ef/Astronomy%20Quiz%20Google%20Forms%20Header%20in%20Colorful%20Modern%20Style.PNG" alt="Astronomy Quiz Header">
</div>

<!-- CONTEÚDO -->
<div class="container">

    <h1>SINUCAF 2026</h1>

    <!-- PLANILHA -->
    <div class="sheet">
        <iframe 
            src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTINVyd87Y-5Mot8Q1z1bj_VxZ1gtVKN_HJg1nvppggmGNUFq1_pXwL-Lyrbqo5p6dTHPh64L2-hpbA/pubhtml?gid=1988427649&single=true&widget=true&headers=false">
        </iframe>
    </div>

</div>

</body>
</html>
