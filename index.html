<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINUCAF 2026</title>

<style>
/* RESET GLOBAL */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #eef2f7;
    overflow-x: hidden; /* 🔥 remove barra lateral */
}

/* HERO FULL WIDTH */
.hero img {
    width: 100vw;
    max-width: 100%;
    height: auto;
    display: block;
}

/* HEADER */
.header {
    text-align: center;
    padding: 2rem 1rem 1rem;
}

.header h1 {
    font-size: clamp(1.8rem, 3vw, 3rem);
}

.header p {
    color: #555;
}

/* CONTAINER FULL WIDTH CONTROLADO */
.container {
    width: 100%;
    max-width: 100%; /* 🔥 remove limite que causava scroll */
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* CARD */
.card {
    width: 100%;
    background: #fff;
    border-radius: 16px;
    padding: 1rem;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

/* PLANILHA FULL RESPONSIVA */
.sheet {
    width: 100%;
    height: 80vh; /* 🔥 ocupa quase tela inteira */
    border-radius: 12px;
    overflow: hidden;
}

.sheet iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 2rem 1rem;
    color: #666;
}
</style>

</head>

<body>

<!-- BANNER -->
<div class="hero">
    <img src="https://github.com/deux78/site-do-sinucaf/raw/7931415d7193dfd1a3e0f9bdadec623c088bd3ef/Astronomy%20Quiz%20Google%20Forms%20Header%20in%20Colorful%20Modern%20Style.PNG">
</div>

<!-- HEADER -->
<div class="header">
    <h1>SINUCAF 2026</h1>
    <p>Sistema oficial do torneio</p>
</div>

<!-- CONTEÚDO -->
<div class="container">

    <div class="card">
        <div class="sheet">
            <iframe 
                src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTINVyd87Y-5Mot8Q1z1bj_VxZ1gtVKN_HJg1nvppggmGNUFq1_pXwL-Lyrbqo5p6dTHPh64L2-hpbA/pubhtml?gid=1988427649&single=true&widget=true&headers=false">
            </iframe>
        </div>
    </div>

</div>

<footer>
    SINUCAF 2026
</footer>

</body>
</html>
