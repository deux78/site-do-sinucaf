<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINUCAF 2026 - Pontos Corridos</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #eef2f7;
    overflow-x: hidden; /* 🔥 remove scroll horizontal */
}

/* BANNER */
.hero img {
    width: 100%;
    height: auto;
    display: block;
}

/* HEADER */
.header {
    text-align: center;
    padding: 1.5rem;
}

.header h1 {
    font-size: clamp(1.8rem, 3vw, 2.8rem);
}

.header p {
    color: #555;
}

/* CONTAINER */
.container {
    width: 100%;
    max-width: 100%;
    padding: 1rem;
    display: flex;
    justify-content: center;
}

/* CARD */
.card {
    width: 100%;
    max-width: 1200px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    overflow: hidden;
}

/* TABELA RESPONSIVA (SEM SCROLL HORIZONTAL) */
.table-wrap {
    width: 100%;
    overflow-x: auto; /* só ativa se necessário, mas quase nunca aparece */
}

iframe {
    width: 100%;
    height: 85vh; /* ocupa quase a tela inteira */
    border: none;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 2rem;
    color: #666;
    font-size: 0.9rem;
}

/* MOBILE AJUSTE */
@media (max-width: 768px) {
    iframe {
        height: 75vh;
    }
}
</style>

</head>

<body>

<!-- BANNER -->
<div class="hero">
    <img src="https://github.com/deux78/site-do-sinucaf/raw/7931415d7193dfd1a3e0f9bdadec623c088bd3ef/Astronomy%20Quiz%20Google%20Forms%20Header%20in%20Colorful%20Modern%20Style.PNG">
</div>

<!-- HEADER -->
<div class="header">
    <h1>SINUCAF 2026</h1>
    <p>Sistema de Pontos Corridos Oficial</p>
</div>

<!-- SISTEMA -->
<div class="container">

    <div class="card">

        <iframe 
            src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTINVyd87Y-5Mot8Q1z1bj_VxZ1gtVKN_HJg1nvppggmGNUFq1_pXwL-Lyrbqo5p6dTHPh64L2-hpbA/pubhtml?gid=1988427649&single=true&widget=true&headers=false">
        </iframe>

    </div>

</div>

<footer>
    Sistema de Pontos Corridos - SINUCAF 2026
</footer>

</body>
</html>
